databases:
  - name: neural-cutting-db
    plan: free
    region: frankfurt
    databaseName: neural_cutting

services:
  - type: web
    name: neural-cutting-api
    env: docker
    region: frankfurt
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production

      - key: DB_URL
        fromDatabase:
          name: neural-cutting-db
          property: connectionString

      - key: DB_USERNAME
        fromDatabase:
          name: neural-cutting-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: neural-cutting-db
          property: password

      - key: DB_POOL_SIZE
        value: 2

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRATION
        value: PT24H

      - key: UPLOAD_PATH
        value: /opt/app/uploads

      - key: ANALYSIS_CLIENT_MODE
        value: stub

      - key: HH_RU_ENABLED
        value: true