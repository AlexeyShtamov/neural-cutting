server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: neural-cutting
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neural_cutting}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-with-at-least-32-characters}
    expiration: ${JWT_EXPIRATION:PT12H}
  storage:
    upload-dir: ${UPLOAD_PATH:./uploads}
  analysis:
    mode: ${ANALYSIS_CLIENT_MODE:stub}
    base-url: ${ANALYSIS_BASE_URL:http://analysis-service:8000}
    endpoint: ${ANALYSIS_ENDPOINT:/api/v1/analyze}
    connect-timeout: ${ANALYSIS_CONNECT_TIMEOUT:PT3S}
    read-timeout: ${ANALYSIS_READ_TIMEOUT:PT10S}
  hh-ru:
    base-url: ${HH_RU_BASE_URL:https://api.hh.ru}
    user-agent: ${HH_RU_USER_AGENT:NeuralCutting/1.0}
    connect-timeout: ${HH_RU_CONNECT_TIMEOUT:PT5S}
    read-timeout: ${HH_RU_READ_TIMEOUT:PT10S}
    enabled: ${HH_RU_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/neural_cutting}

app:
  storage:
    upload-dir: ${UPLOAD_PATH:/opt/app/uploads}
