spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-that-is-long-enough-for-hmac-signing-123456
    expiration: PT1H
  storage:
    upload-dir: ./target/test-uploads
  analysis:
    mode: stub
    base-url: http://localhost:8000
    endpoint: /api/v1/analyze
